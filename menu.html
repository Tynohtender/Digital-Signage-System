<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Dashboard</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* BODY */
body{
    min-height:100vh;
    padding:40px;
    background:url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1974&auto=format&fit=crop") center/cover no-repeat fixed;
    position:relative;
    color:white;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(3px);
    z-index:-1;
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:30px;
    font-size:40px;
    letter-spacing:2px;
}

/* TOP PANEL */
.top-panel{
    width:100%;
    max-width:1000px;
    margin:auto;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.1);

    padding:25px;
    border-radius:25px;

    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;

    box-shadow:
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 0 15px rgba(255,255,255,0.05);
}

/* INPUTS */
.top-panel input{
    padding:15px 18px;
    border:none;
    outline:none;
    border-radius:18px;

    min-width:220px;

    background:rgba(255,255,255,0.08);

    color:white;
    font-size:15px;

    backdrop-filter:blur(10px);

    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.08),
        0 4px 20px rgba(0,0,0,0.2);
}

.top-panel input::placeholder{
    color:#ddd;
}

/* FILE INPUT */
input[type="file"]{
    color:white;
    padding:12px;
}

/* BUTTONS */
button{
    border:none;
    cursor:pointer;

    padding:14px 24px;

    border-radius:18px;

    color:white;
    font-weight:bold;
    font-size:15px;

    transition:0.3s;

    background:linear-gradient(90deg,#7b2ff7,#f107a3);

    box-shadow:0 5px 20px rgba(241,7,163,0.4);
}

button:hover{
    transform:translateY(-2px) scale(1.03);
}

/* MENU GRID */
#menu{
    margin-top:40px;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:25px;

    padding:20px;

    box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        inset 0 0 12px rgba(255,255,255,0.04);

    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* IMAGE */
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:18px;
    margin-bottom:15px;
}

/* TEXT */
.card h3{
    font-size:22px;
    margin-bottom:10px;
}

.card p{
    color:#ffb347;
    margin-bottom:15px;
    font-size:18px;
}

/* ACTION BUTTONS */
.actions{
    display:flex;
    gap:10px;
}

.delete-btn{
    background:linear-gradient(90deg,#ff0844,#ff4b2b);
}

/* MOBILE */
@media(max-width:700px){

    body{
        padding:20px;
    }

    h2{
        font-size:28px;
    }

    .top-panel{
        flex-direction:column;
    }

    .top-panel input{
        width:100%;
    }

}

</style>
</head>

<body>

<h2>Digital Menu Dashboard</h2>

<div class="top-panel">

    <input id="title" placeholder="Menu Title">

    <input id="price" placeholder="Price">

    <input type="file" id="image" accept="image/*">

    <button onclick="addMenu()">Add Item</button>

</div>

<div id="menu"></div>

<script>

const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

const clientId = localStorage.getItem("client_id");

/* =========================
   ADD MENU
========================= */
async function addMenu(){

let file = document.getElementById("image").files[0];

if(!file){
    alert("Please select an image");
    return;
}

let formData = new FormData();

formData.append("file", file);

let uploadRes = await fetch(
    "http://127.0.0.1:8000/upload-image/",
{
    method:"POST",
    body:formData
});

let uploadData = await uploadRes.json();

await fetch("http://127.0.0.1:8000/add-menu/", {

method:"POST",

headers:{
    "Content-Type":"application/json"
},

body:JSON.stringify({

    title:document.getElementById("title").value,

    price:document.getElementById("price").value,

    image:`/images/${uploadData.filename}`,

    client_id:clientId

})

});

document.getElementById("title").value = "";
document.getElementById("price").value = "";
document.getElementById("image").value = "";

loadMenu();

}

/* =========================
   LOAD MENU
========================= */
function loadMenu(){

fetch(`http://127.0.0.1:8000/menu/${clientId}`)

.then(res => res.json())

.then(data => {

let html = "";

if(data.length === 0){

    html = `
    <div style="
        text-align:center;
        grid-column:1/-1;
        font-size:22px;
    ">
        No menu items yet
    </div>
    `;

}else{

    data.forEach(item => {

        html += `

        <div class="card">

            <img
                src="http://127.0.0.1:8000${item.image}"
                onerror="this.src='https://via.placeholder.com/300x200'"
            >

            <h3>${item.title}</h3>

            <p>${item.price}</p>

            <div class="actions">

                <button
                    onclick="editItem(${item.id}, '${item.title}', '${item.price}')"
                >
                    Edit
                </button>

                <button
                    class="delete-btn"
                    onclick="deleteItem(${item.id})"
                >
                    Delete
                </button>

            </div>

        </div>

        `;
    });

}

document.getElementById("menu").innerHTML = html;

});

}

/* =========================
   DELETE
========================= */
function deleteItem(id){

fetch(`http://127.0.0.1:8000/delete-menu/${id}`, {
    method:"DELETE"
})
.then(() => {
    loadMenu();
});

}

/* =========================
   EDIT
========================= */
function editItem(id, oldTitle, oldPrice){

let newTitle = prompt("Edit Title:", oldTitle);

if(newTitle === null) return;

let newPrice = prompt("Edit Price:", oldPrice);

if(newPrice === null) return;

fetch(`http://127.0.0.1:8000/update-menu/${id}`, {

method:"PUT",

headers:{
    "Content-Type":"application/json"
},

body:JSON.stringify({
    title:newTitle,
    price:newPrice
})

})
.then(res => res.json())
.then(() => {
    loadMenu();
});

}

/* START */
loadMenu();

</script>

</body>
</html>
